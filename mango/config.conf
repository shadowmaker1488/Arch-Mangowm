# ==========================i===============================
# MANGO WM CONFIG 
# =========================================================

# Autostart apps 

	exec-once = waybar
	exec-once = awww-daemon
  exec-once = ~/.config/swaylock/swayidle.sh
	exec-once = mako
	exec-once = ~/.config/mako/charge-notify.sh
  exec-once = xdg-desktop-portal-wlr 
	exec-once = lxqt-policykit-agent
	exec-once = ~/.config/swaylock/wlsunset.sh
	exec-once = udiskie
	exec-once = playerctld daemon
	exec-once = clipse -listen
  exec-once = Telegram -startintray

# Env. variables
# Env. variables
env=XDG_CURRENT_DESKTOP,Mango
env=XDG_SESSION_TYPE,wayland
env=XDG_SESSION_DESKTOP,Mango
env=QT_QPA_PLATFORMTHEME,qt5ct
env=QT_QPA_PLATFORM,wayland;xcb
env=XCURSOR_SIZE,24

# Monitor settings 
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:60.164001,x:0,y:0

# ---------------------------------------------------------
# VZHLED A DEKORACE (Gaps 2, Border 2, Rounding 10)
# ---------------------------------------------------------
blur=0
shadows = 0
layer_shadows = 0
border_radius=10
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0
gappih=2
gappiv=2
gappoh=2
gappov=2
borderpx=2
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
scratchpadcolor=0x516c93ff

# Barvy
rootcolor=0x201b14ff
bordercolor=0x595959aa       # Inactive border
focuscolor=0xcc5500ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# ---------------------------------------------------------
# ANIMACE
# ---------------------------------------------------------
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8

# Zrychlené časy dle tvých "speed" proměnných v Hyprlandu
animation_duration_move=300
animation_duration_open=250
animation_duration_tag=250
animation_duration_close=250
animation_duration_focus=0

# Hyprland custom bezier curves
animation_curve_open=0.23,1.0,0.32,1
animation_curve_move=0.23,1.0,0.32,1
animation_curve_tag=0.23,1.0,0.32,1
animation_curve_close=0.15,0.0,0.1,1
animation_curve_focus=0.23,1.0,0.32,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.23,1.0,0.32,1

# ---------------------------------------------------------
# LAYOUT (Dwindle jako výchozí)
# ---------------------------------------------------------


bind=SUPER+SHIFT,x,switch_layout
bind=ALT,Tab,toggleoverview,


tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle
tagrule=id:10,layout_name:dwindle

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.333,0.5,0.667,1.0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=1

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30


# ---------------------------------------------------------
# VSTUPY A MYŠ
# ---------------------------------------------------------
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=cz

# Touchpad (disable_while_typing=false v Hyprlandu -> 0 v Mangu)
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=0
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
mouse_natural_scrolling=0
click_method=2
gesturebind=NONE,left,3,viewtoleft
gesturebind=NONE,right,3,viewtoright

# ---------------------------------------------------------
# MISC
# ---------------------------------------------------------
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=0
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# Pravidla pro vrstvy (Rofi z animací)
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# =========================================================
# KLÁVESOVÉ ZKRATKY
# =========================================================

# Systémové
bind=SUPER,r,reload_config
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,f,togglefloating,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,s,dwindle_toggle_split_direction,
bind=SUPER+SHIFT,g,toggleglobal

# Aplikace
bind=SUPER,Return,spawn,kitty
bind=SUPER,d,spawn,kitty -e yazi
bind=SUPER+SHIFT,m,spawn,kitty -e pulsemixer
bind=SUPER,b,spawn,firefox
bind=CTRL+SHIFT,p,spawn,firefox --private-window
bind=SUPER+SHIFT,p,spawn,hyprpicker -a
bind=SUPER+ALT,l,spawn,swaylock
bind=SUPER,c,spawn,kitty -e calcurse
bind=SUPER,o,spawn,libreoffice
bind=SUPER,m,spawn,kitty -e aerc
bind=SUPER,n,spawn,kitty -e newsboat
bind=SUPER,w,spawn,waypaper
bind=SUPER,v,spawn,clipse-gui
bind=SUPER,p,spawn,kitty -T omarchy-tui -e omarchy-send --pin 1933
bind=SUPER,t,spawn,kitty -e htop

# Scratchpads 
# Send current window to scratchpad
bind=SUPER+SHIFT,y,minimized

# Toggle (show/hide) the scratchpad
bind=SUPER,y,toggle_scratchpad

# Retrieve window from scratchpad (restore)
bind=SUPER+SHIFT,i,restore_minimized

# Ncspot scratchpad 
bind=SUPER,s,toggle_named_scratchpad,none,ncspot,kitty -T ncspot -e ncspot

# Skripty a Rofi
bind=SUPER,Space,spawn,rofi -show drun
bind=SUPER,Escape,spawn,~/.config/rofi/scripts/rofi-powermenu.sh
bind=SUPER+SHIFT,c,spawn,~/.config/rofi/scripts/rofi-calc.sh
bind=SUPER+SHIFT,w,spawn,~/.config/waybar/scripts/waybar-theme.sh
bind=SUPER+SHIFT,r,spawn,~/.config/waybar/scripts/reload.sh

# Media, Zvuk a Jas (XF86)
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,pactl set-source-mute 0 toggle
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioStop,spawn,playerctl stop
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# Ostatní utility
bind=SUPER+SHIFT,n,spawn,makoctl restore
bind=NONE,Print,spawn,sh -c 'FILE=~/Obrázky/Screenshot_$(date +"%Y%m%d_%H%M%S").png; grim - | tee "$FILE" | wl-copy && notify-send -i "$FILE" "Screenshot" "Uloženo do Obrázků a schránky"'
bind=SHIFT,Print,spawn,sh -c 'GEOMETRY=$(slurp) && [ -n "$GEOMETRY" ] && FILE=~/Obrázky/Screenshot_$(date +"%Y%m%d_%H%M%S").png && grim -g "$GEOMETRY" - | tee "$FILE" | wl-copy && notify-send -i "$FILE" "Výřez" "Uloženo do Obrázků a schránky"'
bind=SUPER+ALT,i,spawn,kitty -e nmtui 
bind=SUPER+ALT,b,spawn,kitty -e bluetui


# POHYB, FOCUS A VELIKOST (hjkl + šipky)
# ---------------------------------------------------------
# Focus
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Přesun okna
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Změna velikosti okna
bind=SUPER+CTRL,h,resizewin,-50,+0
bind=SUPER+CTRL,l,resizewin,+50,+0
bind=SUPER+CTRL,k,resizewin,+0,-50
bind=SUPER+CTRL,j,resizewin,+0,+50
bind=SUPER+CTRL,Left,resizewin,-50,+0
bind=SUPER+CTRL,Right,resizewin,+50,+0
bind=SUPER+CTRL,Up,resizewin,+0,-50
bind=SUPER+CTRL,Down,resizewin,+0,+50

# ---------------------------------------------------------
# PRACOVNÍ PLOCHY (Česká klávesnice + Numpad)
# ---------------------------------------------------------
# Přepínání (Česká horní řada)
bind=SUPER,plus,view,1,0
bind=SUPER,ecaron,view,2,0
bind=SUPER,scaron,view,3,0
bind=SUPER,ccaron,view,4,0
bind=SUPER,rcaron,view,5,0
bind=SUPER,zcaron,view,6,0
bind=SUPER,yacute,view,7,0
bind=SUPER,aacute,view,8,0
bind=SUPER,iacute,view,9,0
bind=SUPER,eacute,view,10,0

# Přesun na plochu (Česká horní řada)
bind=SUPER+SHIFT,plus,tag,1,0
bind=SUPER+SHIFT,ecaron,tag,2,0
bind=SUPER+SHIFT,scaron,tag,3,0
bind=SUPER+SHIFT,ccaron,tag,4,0
bind=SUPER+SHIFT,rcaron,tag,5,0
bind=SUPER+SHIFT,zcaron,tag,6,0
bind=SUPER+SHIFT,yacute,tag,7,0
bind=SUPER+SHIFT,aacute,tag,8,0
bind=SUPER+SHIFT,iacute,tag,9,0
bind=SUPER+SHIFT,eacute,tag,10,0

# Numpad přepínání
bind=SUPER,KP_End,view,1,0
bind=SUPER,KP_Down,view,2,0
bind=SUPER,KP_Next,view,3,0
bind=SUPER,KP_Left,view,4,0
bind=SUPER,KP_Begin,view,5,0
bind=SUPER,KP_Right,view,6,0
bind=SUPER,KP_Home,view,7,0
bind=SUPER,KP_Up,view,8,0
bind=SUPER,KP_Prior,view,9,0
bind=SUPER,KP_Insert,view,10,0

# Numpad přesun oken
bind=SUPER+SHIFT,KP_End,tag,1,0
bind=SUPER+SHIFT,KP_Down,tag,2,0
bind=SUPER+SHIFT,KP_Next,tag,3,0
bind=SUPER+SHIFT,KP_Left,tag,4,0
bind=SUPER+SHIFT,KP_Begin,tag,5,0
bind=SUPER+SHIFT,KP_Right,tag,6,0
bind=SUPER+SHIFT,KP_Home,tag,7,0
bind=SUPER+SHIFT,KP_Up,tag,8,0
bind=SUPER+SHIFT,KP_Prior,tag,9,0
bind=SUPER+SHIFT,KP_Insert,tag,10,0

# Scrollování mezi plochami
bind=SUPER+ALT,Right,viewtoright_have_client,0
bind=SUPER+ALT,Left,viewtoleft_have_client,0

# Windowrules 

# Waypaper 
windowrule=isfloating:1,width:560,height:570,appid:waypaper

# omarchy-send
windowrule=isfloating:1,width:1000,height:500,title:omarchy-tui
# Clipse 
windowrule=isfloating:1,width:560,height:570,appid:clipse-gui

# Localsend 
windowrule=isfloating:1,width:560,height:570,appid:localsend

# LXQt PolicyKit 
windowrule=isfloating:1,width:1000,height:500,appid:lxqt-policykit-agent

# ncspot scratchpad 
windowrule=isnamedscratchpad:1,isfloating:1,width:1300,height:700,title:ncspot

# Steam (automatický přesun na plochu 3)
windowrule=tags:3,appid:steam
windowrule=tags:3,appid:lutris

# MYŠ A GESTA
# ---------------------------------------------------------
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
axisbind=SUPER,UP,viewtoright_have_client
axisbind=SUPER,DOWN,viewtoleft_have_client

# DMS Include Configs
source = ./dms/binds.conf
