# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Startup 

 exec-once = waybar
 exec-once = hypridle
 exec-once = deluged
 exec-once = awww-daemon
 exec-once = swaync 
 exec-once = ~/.config/hypr/scripts/xdg-portal-hyprland
 exec-once = lxqt-policykit-agent
 exec-once = ~/.config/hypr/scripts/wlsunset.sh
 exec-once = udiskie 
 exec-once = playerctld daemon
 exec-once = clipse -listen 

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=10
scroller_default_proportion=0.8
scroller_focus_center=1
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=cz

# Touchpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# Window rules 
windowrule=width:1000,height:900,appid:ncspot

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:right_tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config


# Apps 
bind = SUPER,Return,spawn,kitty
bind = SUPER,d,spawn,kitty -e yazi 
bind = SUPER+SHIFT,m,spawn,kitty -e pulsemixer
bind = SUPER,b,spawn,firefox
bind = SUPER+ALT,l,spawn,swaylock
bind = SUPER,c, spawn, kitty -e calcurse 
bind = SUPER,o, spawn, libreoffice
bind = SUPER,m, spawn, thunderbird
bind = SUPER,n, spawn, kitty -e newsboat 
bind = SUPER,w, spawn, waypaper
bind = SUPER,v, spawn, clipse-gui
bind = SUPER,p, spawn, localsend

# rofi
bind=SUPER+SHIFT,f, spawn,rofi -show drun
bind=SUPER,Escape, spawn, ~/.config/rofi/scripts/rofi-powermenu.sh
bind =SUPER+SHIFT, c, spawn, ~/.config/rofi/scripts/rofi-calc.sh
bind = SUPER+SHIFT, w, spawn, ~/.config/waybar/scripts/waybar-theme.sh

# Printscreen
bind = NONE,Print,spawn, grimblast --notify --freeze copysave screen 
bind = SHIFT+Print,spawn, grimblast copysave area --freeze --notify

# exit
bind=SUPER,q,killclient

# switch window focus (vimkeys)
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# switch window focus (arrowkeys)
bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# swap window (vimkeys)
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# Volume & brightness & media keys
bind=NONE,XF86AudioRaiseVolume, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute, spawn, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind=NONE,XF86AudioPlay, spawn, playerctl play-pause
bind=NONE,XF86AudioPause, spawn, playerctl play-pause
bind=NONE,XF86AudioNext, spawn, playerctl next
bind=NONE,XF86AudioPrev, spawn, playerctl previous
bind=NONE,XF86AudioStop, spawn, playerctl stop
bind=NONE,XF86AudioMicMute,spawn,pactl set-source-mute 0 toggle

bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-


# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER,space,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER+SHIFT,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Numpad tags 
# Switch to tag using numpad
bind = SUPER, KP_End, view, 1
bind = SUPER, KP_Down, view, 2
bind = SUPER, KP_Next, view, 3
bind = SUPER, KP_Left, view, 4
bind = SUPER, KP_Begin, view, 5
bind = SUPER, KP_Right, view, 6
bind = SUPER, KP_Home, view, 7
bind = SUPER, KP_Up, view, 8
bind = SUPER, KP_Prior, view, 9
bind = SUPER, KP_Insert, view, 10 

# Numpad tags 
# Switch to tag using numpad
bind = SUPER+SHIFT, KP_End, tag,1,0 
bind = SUPER+SHIFT, KP_Down,tag, 2,0 
bind = SUPER+SHIFT, KP_Next,tag, 3,0 
bind = SUPER+SHIFT, KP_Left,tag, 4,0 
bind = SUPER+SHIFT, KP_Begin, tag, 5,0 
bind = SUPER+SHIFT, KP_Right, tag, 6,0 
bind = SUPER+SHIFT, KP_Home, tag, 7,0 
bind = SUPER+SHIFT, KP_Up, tag, 8,0 
bind = SUPER+SHIFT, KP_Prior, tag, 9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=SUPER+CTRL,Up,resizewin,+0,-50
bind=SUPER+CTRL,Down,resizewin,+0,+50
bind=SUPER+CTRL,Left,resizewin,-50,+0
bind=SUPER+CTRL,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
